name: ci-pr
on: [pull_request, workflow_dispatch]
jobs:
  format-check:
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v6
      - name: init
        run: .github/init_ubuntu_26.04.sh --skip-install
      - name: format code
        run: scripts/format_code.sh
      - name: check diff
        run: .github/format_check_diff.sh
  build-and-test:
    continue-on-error: true
    strategy:
      matrix:
        os: [ubuntu-26.04, ubuntu-26.04-arm, windows-latest]
        preset: [ninja-gcc, ninja-clang, vs26]
        exclude:
          - os: ubuntu-26.04
            preset: vs26
          - os: ubuntu-26.04-arm
            preset: vs26
        include:
          - preset: vs26
            build_args: --parallel
          - preset: ninja-gcc
            build_args: -- -v
          - preset: ninja-clang
            build_args: -- -v
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: init
        run: cmake -P .github/init.cmake
      - name: configure
        run: cmake -S . --preset=${{ matrix.preset }} -B build -DKVF_USE_FREETYPE=OFF
      - name: build debug
        run: cmake --build build --config=Debug ${{ matrix.build_args }}
      - name: build release
        run: cmake --build build --config=Release ${{ matrix.build_args }}
      - name: test debug
        run: cd build && ctest -V -C Debug
      - name: test release
        run: cd build && ctest -V -C Release
